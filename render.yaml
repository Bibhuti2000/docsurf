databases:
  - name: docsurf-db
    databaseName: docsurf
    user: docsurf_user
    plan: free

services:
  # ── Next.js Web App ──────────────────────────────────────────────────────────
  - type: web
    name: docsurf-app
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docsurf-db
          property: connectionString
      - key: AUTH_SECRET
        sync: false      # Set manually in Render dashboard
      - key: NEXTAUTH_URL
        sync: false      # e.g. https://docsurf-app.onrender.com
      - key: GROQ_API_KEY
        sync: false      # Your Groq API key
      - key: NEXT_PUBLIC_WS_URL
        sync: false      # e.g. wss://docsurf-ws.onrender.com
      - key: NODE_ENV
        value: production

  # ── Yjs WebSocket Server ─────────────────────────────────────────────────────
  - type: web
    name: docsurf-ws
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docsurf-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false      # Same deployed Next.js URL (for session validation)
      - key: PORT
        value: "10000"   # Render assigns this; server.js needs to respect it
